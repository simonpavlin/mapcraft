<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapCraft — Prohlížeč map</title>
<style>
  :root { --bg:#1a1a2e; --sf:#16213e; --sf2:#0f3460; --ac:#e94560; --ac2:#533483; --tx:#e0e0e0; --tx2:#a0a0b0; --bd:#2a2a4a; --gn:#4ade80; --yl:#facc15; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--tx); display:flex; height:100vh; overflow:hidden; }
  #sidebar { width:300px; min-width:300px; background:var(--sf); border-right:1px solid var(--bd); display:flex; flex-direction:column; overflow:hidden; }
  #sidebar-header { padding:16px; border-bottom:1px solid var(--bd); background:var(--sf2); }
  #sidebar-header h1 { font-size:18px; color:var(--ac); }
  #sidebar-header p { font-size:12px; color:var(--tx2); margin-top:4px; }
  #tree-container { flex:1; overflow-y:auto; padding:8px; }
  .tree-node { user-select:none; }
  .tree-row { display:flex; align-items:center; padding:5px 8px; border-radius:4px; cursor:pointer; gap:6px; font-size:13px; transition:background .1s; }
  .tree-row:hover { background:rgba(233,69,96,.1); }
  .tree-row.active { background:rgba(233,69,96,.2); color:var(--ac); }
  .tree-toggle { width:16px; text-align:center; font-size:10px; color:var(--tx2); flex-shrink:0; }
  .tree-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tree-badge { font-size:10px; background:var(--sf2); padding:1px 5px; border-radius:8px; color:var(--tx2); }
  .tree-tag { font-size:9px; padding:1px 4px; border-radius:3px; background:var(--ac2); color:var(--tx); margin-left:2px; }
  .tree-children { margin-left:16px; }
  .tree-children.collapsed { display:none; }
  #main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #breadcrumb { padding:10px 20px; background:var(--sf); border-bottom:1px solid var(--bd); display:flex; align-items:center; gap:6px; font-size:13px; flex-wrap:wrap; }
  .crumb { color:var(--tx2); cursor:pointer; } .crumb:hover { color:var(--ac); } .crumb.current { color:var(--tx); font-weight:600; }
  .crumb-sep { color:var(--tx2); opacity:.5; }
  #toolbar { display:flex; background:var(--sf); border-bottom:1px solid var(--bd); padding:6px 16px; gap:8px; align-items:center; flex-wrap:wrap; }
  .tab { padding:8px 16px; font-size:13px; cursor:pointer; color:var(--tx2); border-bottom:2px solid transparent; transition:all .15s; }
  .tab:hover { color:var(--tx); } .tab.active { color:var(--ac); border-bottom-color:var(--ac); }
  .floor-btn { padding:4px 12px; font-size:12px; cursor:pointer; border:1px solid var(--bd); border-radius:4px; background:var(--sf2); color:var(--tx2); transition:all .1s; }
  .floor-btn:hover { border-color:var(--ac); color:var(--tx); }
  .floor-btn.active { background:var(--ac); color:#fff; border-color:var(--ac); }
  .floor-label { font-size:11px; color:var(--tx2); margin-left:8px; }
  #content { flex:1; overflow:auto; padding:20px; }
  .info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin-bottom:20px; }
  .info-card { background:var(--sf); border:1px solid var(--bd); border-radius:8px; padding:14px; }
  .info-card h3 { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--tx2); margin-bottom:6px; }
  .info-card .value { font-size:18px; font-weight:600; }
  .info-card .sub { font-size:12px; color:var(--tx2); margin-top:4px; }
  .meta-table { width:100%; font-size:12px; border-collapse:collapse; margin-top:8px; }
  .meta-table td { padding:4px 8px; border-bottom:1px solid var(--bd); }
  .meta-table td:first-child { color:var(--ac); font-weight:600; width:120px; }
  #ascii-view { background:var(--sf); border:1px solid var(--bd); border-radius:8px; padding:16px; overflow:auto; }
  #ascii-grid { font-family:'Cascadia Code','Fira Code','Consolas',monospace; font-size:13px; line-height:1.35; white-space:pre; letter-spacing:0.6em; }
  #ascii-legend,.legend-wrap { margin-top:12px; display:flex; flex-wrap:wrap; gap:8px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; background:var(--bg); padding:4px 10px; border-radius:4px; cursor:pointer; }
  .legend-item:hover { background:var(--sf2); }
  .legend-char { font-family:monospace; font-weight:bold; width:20px; height:20px; display:flex; align-items:center; justify-content:center; border-radius:3px; }
  .children-table { width:100%; border-collapse:collapse; font-size:13px; }
  .children-table th { text-align:left; padding:8px 12px; border-bottom:2px solid var(--bd); color:var(--tx2); font-size:11px; text-transform:uppercase; }
  .children-table td { padding:8px 12px; border-bottom:1px solid var(--bd); vertical-align:top; }
  .children-table tr { cursor:pointer; transition:background .1s; } .children-table tr:hover { background:rgba(233,69,96,.08); }
  .obj-char { font-family:monospace; font-weight:bold; font-size:16px; width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center; border-radius:4px; }
  .tag { font-size:10px; padding:2px 6px; border-radius:4px; background:var(--ac2); color:var(--tx); margin-right:4px; }
  .meta-pill { font-size:10px; padding:2px 6px; border-radius:4px; background:var(--sf2); color:var(--tx2); margin-right:3px; }
  .empty-state { text-align:center; padding:60px 20px; color:var(--tx2); }
  .empty-state h2 { font-size:18px; margin-bottom:8px; color:var(--tx); }
  #refresh-btn { position:fixed; bottom:20px; right:20px; background:var(--ac); color:#fff; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; box-shadow:0 4px 12px rgba(233,69,96,.3); z-index:100; }
  #auto-refresh { position:fixed; bottom:20px; right:140px; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--tx2); z-index:100; }
  ::-webkit-scrollbar { width:8px; height:8px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--bd); border-radius:4px; }
  .view-with-panel { display:flex; gap:16px; align-items:flex-start; }
  .view-main { flex:1; min-width:0; }
  #hover-info { width:240px; min-width:240px; background:var(--sf); border:1px solid var(--bd); border-radius:8px; padding:14px; position:sticky; top:0; align-self:flex-start; }
  #hover-info .hi-empty { color:var(--tx2); font-size:12px; font-style:italic; }
  #hover-info .hi-char { font-family:monospace; font-weight:bold; font-size:24px; width:36px; height:36px; display:inline-flex; align-items:center; justify-content:center; border-radius:6px; margin-bottom:8px; }
  #hover-info .hi-name { font-weight:600; font-size:14px; color:var(--ac); margin-bottom:4px; }
  #hover-info .hi-desc { font-size:11px; color:var(--tx2); margin-bottom:8px; }
  #hover-info .hi-row { font-size:11px; color:var(--tx2); line-height:1.8; }
  #hover-info .hi-row b { color:var(--tx); font-weight:600; }
  #hover-info .hi-tags { margin-top:6px; display:flex; flex-wrap:wrap; gap:4px; }
  #hover-info .hi-meta { margin-top:8px; border-top:1px solid var(--bd); padding-top:8px; }
  #hover-info .hi-meta-row { font-size:10px; color:var(--tx2); line-height:1.6; }
  #hover-info .hi-meta-row b { color:var(--tx); }
  #ascii-grid span.achar { cursor:crosshair; }
  #ascii-grid span.achar:hover { outline:1px solid var(--ac); outline-offset:-1px; border-radius:1px; }
</style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-header"><h1>MapCraft</h1><p>Map Explorer v0.4</p></div>
  <div id="tree-container"><div id="tree"></div></div>
</div>
<div id="main">
  <div id="breadcrumb"></div>
  <div id="toolbar"></div>
  <div id="content"><div class="empty-state"><h2>Žádná mapa</h2><p>Použij MCP server k vytvoření mapy</p></div></div>
</div>
<button id="refresh-btn" onclick="refresh()">Obnovit</button>
<div id="auto-refresh"><input type="checkbox" id="auto-refresh-check" checked><label for="auto-refresh-check">Auto (2s)</label></div>

<script>
const COLORS = {'#':'#8b8b8b','.':'#3a3a4a','A':'#e94560','B':'#4ade80','C':'#60a5fa','D':'#facc15','E':'#c084fc','F':'#fb923c','G':'#2dd4bf','H':'#a78bfa','I':'#f87171','K':'#fbbf24','L':'#34d399','M':'#a3e635','O':'#fb923c','P':'#c4b5fd','R':'#fb7185','S':'#f472b6','T':'#4ade80','V':'#38bdf8','W':'#94a3b8','o':'#60a5fa','~':'#38bdf8','=':'#9ca3af','1':'#f59e0b','2':'#8b5cf6'};
function cc(ch) { return COLORS[ch] || '#e0e0e0'; }
function esc(s) { return s ? s.toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

// Info panel helpers
function updateInfoPanel(obj) {
  const el = document.getElementById('hover-info');
  if (!el) return;
  if (!obj) { el.innerHTML = '<div class="hi-empty">Najeď na objekt</div>'; return; }
  const color = cc(obj.char);
  let h = `<div class="hi-char" style="background:${color}22;color:${color}">${esc(obj.char)}</div>`;
  h += `<div class="hi-name">${esc(obj.name)}</div>`;
  if (obj.description) h += `<div class="hi-desc">${esc(obj.description)}</div>`;
  h += `<div class="hi-row"><b>ID:</b> ${esc(obj.id)}</div>`;
  h += `<div class="hi-row"><b>Pozice:</b> (${obj.x}, ${obj.y})</div>`;
  h += `<div class="hi-row"><b>Rozměry:</b> ${obj.width} × ${obj.height}m</div>`;
  h += `<div class="hi-row"><b>Plocha:</b> ${(obj.width * obj.height).toFixed(0)} m²</div>`;
  if (obj.tags?.length) {
    h += '<div class="hi-tags">';
    for (const t of obj.tags) h += `<span class="tag">${esc(t)}</span>`;
    h += '</div>';
  }
  const meta = obj.metadata || {};
  if (Object.keys(meta).length > 0) {
    h += '<div class="hi-meta">';
    for (const [k,v] of Object.entries(meta)) h += `<div class="hi-meta-row"><b>${esc(k)}:</b> ${esc(typeof v === 'object' ? JSON.stringify(v) : v)}</div>`;
    h += '</div>';
  }
  el.innerHTML = h;
}
function buildCharLookup() {
  const map = {};
  for (const c of (nodeData?.children || [])) { map[c.char] = c; }
  return map;
}

let currentPath = '/', currentTab = 'overview', treeData = null, nodeData = null;
let expandedPaths = new Set(['/']), selectedFloor = null, selectedFloorData = null;

async function fetchTree() {
  try { treeData = await (await fetch('/api/tree')).json(); renderTree(); } catch {}
}
async function fetchNode(path) {
  try {
    nodeData = await (await fetch(`/api/node?path=${encodeURIComponent(path)}`)).json();
    // Auto-select first floor if floors detected and none selected
    if (nodeData.floors?.length > 0 && !selectedFloor) {
      await selectFloor(nodeData.floors[0].id);
      return; // selectFloor calls renderContent
    }
    renderContent();
  } catch {}
}
let navHistory = ['/'];
function navigateTo(path) {
  if (currentPath !== path) navHistory.push(currentPath);
  currentPath = path; selectedFloor = null; selectedFloorData = null;
  const parts = path.split('/').filter(Boolean);
  let p = ''; expandedPaths.add('/');
  for (const part of parts) { p = p ? `${p}/${part}` : part; expandedPaths.add(p); }
  fetchNode(path); renderTree();
}
function navigateBack() {
  if (currentPath === '/') return;
  const parts = currentPath.split('/').filter(Boolean);
  parts.pop();
  navigateTo(parts.length === 0 ? '/' : parts.join('/'));
}
// Mouse back button + Backspace
window.addEventListener('mouseup', (e) => { if (e.button === 3) { e.preventDefault(); navigateBack(); } });
window.addEventListener('keydown', (e) => { if (e.key === 'Backspace' && !['INPUT','TEXTAREA'].includes(e.target.tagName)) { e.preventDefault(); navigateBack(); } });
function treeClick(e, path, hasChildren) {
  e.stopPropagation();
  if (hasChildren) { expandedPaths.has(path) ? expandedPaths.delete(path) : expandedPaths.add(path); }
  currentPath = path; fetchNode(path); renderTree();
}
function renderTree() {
  if (!treeData || treeData.error) { document.getElementById('tree').innerHTML = `<p style="padding:16px;color:var(--tx2)">${treeData?.error||'Žádná data'}</p>`; return; }
  document.getElementById('tree').innerHTML = renderTreeNode(treeData);
}
function renderTreeNode(n) {
  const has = n.children?.length > 0, exp = expandedPaths.has(n.path), act = currentPath === n.path;
  let h = `<div class="tree-node"><div class="tree-row ${act?'active':''}" onclick="treeClick(event,'${n.path}',${has})">`;
  h += `<span class="tree-toggle">${has?(exp?'▼':'▶'):'·'}</span>`;
  h += `<span class="tree-name">${esc(n.name)}</span>`;
  if (n.childCount > 0) h += `<span class="tree-badge">${n.childCount}</span>`;
  if (n.tags?.includes('floor')) h += `<span class="tree-tag">floor</span>`;
  h += '</div>';
  if (has) { h += `<div class="tree-children ${exp?'':'collapsed'}">`; for (const c of n.children) h += renderTreeNode(c); h += '</div>'; }
  return h + '</div>';
}
function switchTab(t) { currentTab = t; renderContent(); }
async function selectFloor(id) {
  selectedFloor = id;
  if (id) {
    const floorPath = currentPath === '/' ? id : `${currentPath}/${id}`;
    try {
      const res = await fetch(`/api/node?path=${encodeURIComponent(floorPath)}`);
      selectedFloorData = await res.json();
    } catch { selectedFloorData = null; }
  } else {
    selectedFloorData = null;
  }
  renderContent();
}
// Helper: draw a single floor plan on a canvas context
function drawFloorContent(ctx, floorChildren, floorDescendants, pw, ph, scale, PAD, shapePath) {
  // Parent outline
  ctx.strokeStyle = '#3a3a5a'; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
  ctx.strokeRect(PAD, PAD, pw*scale, ph*scale); ctx.setLineDash([]);

  const sorted = [...floorChildren].sort((a,b) => (b.width*b.height) - (a.width*a.height));
  for (const c of sorted) {
    const rx = PAD + c.x*scale, ry = PAD + c.y*scale, rw = c.width*scale, rh = c.height*scale;
    const color = cc(c.char);
    const isDoor = c.tags?.includes('door');
    const isWindow = c.tags?.includes('window');
    if (isDoor) { ctx.fillStyle = color + '80'; ctx.fillRect(rx, ry, rw, rh); continue; }
    if (isWindow) { ctx.fillStyle = '#88ccee44'; ctx.fillRect(rx, ry, rw, rh); continue; }
    ctx.fillStyle = color + '25';
    shapePath(ctx, c, rx, ry, scale); ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    shapePath(ctx, c, rx, ry, scale); ctx.stroke();
    const label = c.name;
    const maxFont = Math.min(rw / (label.length * 0.55), rh / 3, 15);
    const fs = Math.max(7, Math.floor(maxFont));
    if (fs >= 7 && rw > 18 && rh > 14) {
      ctx.fillStyle = color; ctx.font = `bold ${fs}px 'Segoe UI',sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(label, rx+rw/2, ry+rh/2 - (fs > 9 ? fs*.35 : 0), rw-4);
      if (fs > 9 && rh > 25) {
        ctx.font = `${Math.max(7,fs-3)}px 'Segoe UI',sans-serif`; ctx.fillStyle = color + 'aa';
        ctx.fillText(`${c.width}×${c.height}m`, rx+rw/2, ry+rh/2+fs*.45, rw-4);
      }
    }
    if (c.metadata && Object.keys(c.metadata).length > 0 && rw > 30 && rh > 35) {
      ctx.font = '8px monospace'; ctx.fillStyle = '#ffffff55';
      const metaStr = Object.entries(c.metadata).map(([k,v]) => `${k}:${v}`).join(' ');
      ctx.fillText(metaStr.substring(0, Math.floor(rw/5)), rx+rw/2, ry+rh-6, rw-6);
    }
  }
  // Descendants
  if (floorDescendants.length > 0) {
    const descSorted = [...floorDescendants].sort((a,b) => {
      if (a._depth !== b._depth) return a._depth - b._depth;
      return (b.width*b.height) - (a.width*a.height);
    });
    for (const dc of descSorted) {
      const rx = PAD + dc.x*scale, ry = PAD + dc.y*scale, rw = dc.width*scale, rh = dc.height*scale;
      const color = cc(dc.char);
      const isDoor = dc.tags?.includes('door');
      const isWindow = dc.tags?.includes('window');
      const isFurniture = dc.tags?.includes('furniture');
      const opacity = Math.max(15, 40 - dc._depth * 10);
      if (isDoor) { ctx.fillStyle = color + Math.round(opacity * 1.5).toString(16).padStart(2,'0'); ctx.fillRect(rx, ry, rw, rh); continue; }
      if (isWindow) { ctx.fillStyle = '#88ccee' + Math.round(opacity).toString(16).padStart(2,'0'); ctx.fillRect(rx, ry, rw, rh); continue; }
      ctx.fillStyle = color + Math.round(opacity * 0.6).toString(16).padStart(2,'0');
      shapePath(ctx, dc, rx, ry, scale); ctx.fill();
      ctx.strokeStyle = color + Math.round(opacity * 2).toString(16).padStart(2,'0');
      ctx.lineWidth = isFurniture ? 0.5 : 1;
      ctx.setLineDash(isFurniture ? [2,2] : [4,3]);
      shapePath(ctx, dc, rx, ry, scale); ctx.stroke();
      ctx.setLineDash([]);
      const maxFontSize = Math.max(6, 12 - dc._depth * 2);
      const label = dc.name;
      const maxFont2 = Math.min(rw / (label.length * 0.55), rh / 3, maxFontSize);
      const fs2 = Math.max(5, Math.floor(maxFont2));
      if (fs2 >= 5 && rw > 12 && rh > 8) {
        ctx.fillStyle = color + Math.round(opacity * 3).toString(16).padStart(2,'0');
        ctx.font = `${fs2}px 'Segoe UI',sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(label, rx+rw/2, ry+rh/2, rw-4);
      }
    }
  }
}

function renderContent() {
  if (!nodeData || nodeData.error) { document.getElementById('content').innerHTML = '<div class="empty-state"><h2>Žádná data</h2></div>'; return; }
  renderBreadcrumb(); renderToolbar();
  switch(currentTab) {
    case 'overview': renderOverview(); break;
    case 'ascii': renderAscii(); break;
    case 'floorplan': renderFloorplan(); break;
    case 'objects': renderObjects(); break;
  }
}
function renderBreadcrumb() {
  const parts = currentPath === '/' ? [] : currentPath.split('/').filter(Boolean);
  let h = `<span class="crumb ${parts.length===0?'current':''}" onclick="navigateTo('/')">Root</span>`;
  let p = '';
  for (let i = 0; i < parts.length; i++) { p = p ? `${p}/${parts[i]}` : parts[i]; h += `<span class="crumb-sep">/</span><span class="crumb ${i===parts.length-1?'current':''}" onclick="navigateTo('${p}')">${esc(parts[i])}</span>`; }
  document.getElementById('breadcrumb').innerHTML = h;
}
function renderToolbar() {
  const d = nodeData;
  let h = '';
  // Tabs
  for (const [id, label] of [['overview','Přehled'],['ascii','ASCII'],['floorplan','Půdorys'],['objects','Objekty']]) {
    h += `<div class="tab ${currentTab===id?'active':''}" onclick="switchTab('${id}')">${label}</div>`;
  }
  // Floor buttons
  if (d.floors && d.floors.length > 0) {
    h += '<span class="floor-label">Patro:</span>';
    for (const f of d.floors) {
      h += `<div class="floor-btn ${selectedFloor===f.id?'active':''}" onclick="selectFloor('${f.id}')">[${esc(f.char)}] ${esc(f.name)}</div>`;
    }
  }
  document.getElementById('toolbar').innerHTML = h;
}

function getVisibleChildren() {
  if (!nodeData) return [];
  return nodeData.children || [];
}

function renderOverview() {
  const d = nodeData;
  let h = '<div class="info-grid">';
  h += infoCard('Název', d.name, d.description || '');
  h += infoCard('Znak', `<span style="font-family:monospace;font-size:28px;color:${cc(d.char)}">${esc(d.char||'-')}</span>`, '');
  if (d.width && d.height) {
    h += infoCard('Rozměry', `${d.width}m × ${d.height}m`, d.scaleInfo || '');
    h += infoCard('Plocha', `${(d.width * d.height).toFixed(0)} m²`, '');
  }
  h += infoCard('Objekty', (d.children||[]).length.toString(), '');
  if (d.tags?.length > 0) h += infoCard('Tagy', d.tags.map(t => `<span class="tag">${esc(t)}</span>`).join(' '), '');
  if (d.floors) h += infoCard('Patra', d.floors.map(f => `[${esc(f.char)}] ${esc(f.name)}`).join(', '), 'Přepínač v toolbaru');
  h += '</div>';

  // Metadata
  const meta = d.metadata || {};
  if (Object.keys(meta).length > 0) {
    h += '<div class="info-card" style="margin-bottom:20px"><h3>Metadata</h3><table class="meta-table">';
    for (const [k, v] of Object.entries(meta)) {
      h += `<tr><td>${esc(k)}</td><td>${esc(typeof v === 'object' ? JSON.stringify(v) : v)}</td></tr>`;
    }
    h += '</table></div>';
  }

  // ASCII preview
  if (d.ascii?.length > 0) {
    h += '<h3 style="margin-bottom:8px;font-size:14px;color:var(--tx2)">Náhled</h3>';
    h += '<div id="ascii-view" style="max-height:400px;overflow:auto">';
    h += `<div id="ascii-grid">${colorizeAscii(d.ascii)}</div>`;
    h += renderLegend(d.legend);
    h += '</div>';
  }
  document.getElementById('content').innerHTML = h;
}

function renderAscii() {
  const d = nodeData;
  if (!d.ascii?.length) { document.getElementById('content').innerHTML = '<div class="empty-state"><h2>Žádná data</h2></div>'; return; }
  let h = '<div class="view-with-panel"><div class="view-main"><div id="ascii-view">';
  if (d.scaleInfo) h += `<p style="margin-bottom:8px;font-size:11px;color:var(--tx2)">${esc(d.scaleInfo)}</p>`;
  h += '<div id="ascii-grid">';
  for (let r = 0; r < d.ascii.length; r++) {
    h += `<span style="color:var(--tx2)">${r.toString().padStart(3)} </span>${colorizeAsciiLine(d.ascii[r])}\n`;
  }
  h += '</div>' + renderLegend(d.legend) + '</div></div>';
  h += '<div id="hover-info"><div class="hi-empty">Najeď na objekt</div></div></div>';
  document.getElementById('content').innerHTML = h;
  const charLookup = buildCharLookup();
  const grid = document.getElementById('ascii-grid');
  if (grid) {
    grid.addEventListener('mousemove', (e) => {
      const span = e.target.closest('.achar');
      updateInfoPanel(span ? charLookup[span.dataset.char] : null);
    });
    grid.addEventListener('mouseleave', () => updateInfoPanel(null));
  }
}

function renderFloorplan() {
  const d = nodeData;
  const allChildren = d.children || [];
  const allDescendants = d.descendants || [];
  if (allChildren.length === 0) { document.getElementById('content').innerHTML = '<div class="empty-state"><h2>Prázdný prostor</h2></div>'; return; }

  // Helper: draw shape path (polygon or rect)
  function shapePath(ctx, obj, ox, oy, s) {
    if (obj.shape && obj.shape.length >= 3) {
      ctx.beginPath();
      ctx.moveTo(ox + obj.shape[0][0]*s, oy + obj.shape[0][1]*s);
      for (let i = 1; i < obj.shape.length; i++) ctx.lineTo(ox + obj.shape[i][0]*s, oy + obj.shape[i][1]*s);
      ctx.closePath();
    } else {
      ctx.beginPath();
      ctx.rect(ox, oy, obj.width*s, obj.height*s);
    }
  }

  const floors = d.floors;
  const hasFloors = floors && floors.length > 0;

  // Determine what to show
  let children, descendants, viewWidth = d.width, viewHeight = d.height;
  if (hasFloors && selectedFloor && selectedFloorData) {
    // Use directly fetched floor data
    children = selectedFloorData.children || [];
    descendants = selectedFloorData.descendants || [];
    viewWidth = selectedFloorData.width || d.width;
    viewHeight = selectedFloorData.height || d.height;
  } else {
    children = allChildren;
    descendants = allDescendants;
  }

  if (children.length === 0) { document.getElementById('content').innerHTML = '<div class="empty-state"><h2>Prázdný prostor</h2></div>'; return; }

  const PAD = 40, maxW = 900, maxH = 600;
  const vpw = viewWidth, vph = viewHeight;
  const scale = Math.min((maxW - PAD*2) / vpw, (maxH - PAD*2) / vph);
  const cw = Math.ceil(vpw * scale + PAD*2), ch = Math.ceil(vph * scale + PAD*2);

  const floorLabel = hasFloors && selectedFloor ? ` — ${floors.find(f=>f.id===selectedFloor)?.name || selectedFloor}` : '';
  let h = '<div class="view-with-panel"><div class="view-main"><div style="background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:16px;overflow:auto">';
  h += `<p style="margin-bottom:8px;font-size:12px;color:var(--tx2)">Půdorys — ${vpw}m × ${vph}m${floorLabel}</p>`;
  h += `<canvas id="fp-canvas" width="${cw}" height="${ch}" style="border:1px solid var(--bd);border-radius:4px;cursor:crosshair"></canvas>`;
  if (descendants.length > 0) {
    h += `<p style="margin-top:8px;font-size:11px;color:var(--tx2)"><span style="display:inline-block;width:12px;height:12px;border:2px solid var(--ac);opacity:.6;vertical-align:middle;margin-right:4px"></span> přímé objekty &nbsp; <span style="display:inline-block;width:12px;height:12px;border:1px dashed var(--tx2);opacity:.6;vertical-align:middle;margin-right:4px"></span> vnořené objekty</p>`;
  }
  h += '</div></div>';
  h += '<div id="hover-info"><div class="hi-empty">Najeď na objekt</div></div></div>';
  document.getElementById('content').innerHTML = h;

  const canvas = document.getElementById('fp-canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, cw, ch);

  drawFloorContent(ctx, children, descendants, vpw, vph, scale, PAD, shapePath);

  // Dimension labels
  ctx.fillStyle = '#606080'; ctx.font = '11px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(`${vpw}m`, PAD+vpw*scale/2, PAD+vph*scale+6);
  ctx.save(); ctx.translate(PAD-8, PAD+vph*scale/2); ctx.rotate(-Math.PI/2); ctx.textBaseline = 'bottom'; ctx.fillText(`${vph}m`, 0, 0); ctx.restore();

  canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const wx = (e.clientX-rect.left-PAD)/scale, wy = (e.clientY-rect.top-PAD)/scale;
    let best = null, bestArea = Infinity;
    for (const c of children) {
      if (wx >= c.x && wx <= c.x+c.width && wy >= c.y && wy <= c.y+c.height) {
        const area = c.width*c.height;
        if (c.hasGrid && area < bestArea) { best = c; bestArea = area; }
      }
    }
    if (best) navigateTo(currentPath === '/' ? best.id : `${currentPath}/${best.id}`);
  };

  // Info panel on hover
  const allObjects = [...children, ...descendants];
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const wx = (e.clientX - rect.left - PAD) / scale, wy = (e.clientY - rect.top - PAD) / scale;
    let best = null, bestArea = Infinity;
    for (const c of allObjects) {
      if (wx >= c.x && wx <= c.x + c.width && wy >= c.y && wy <= c.y + c.height) {
        const area = c.width * c.height;
        if (area < bestArea) { best = c; bestArea = area; }
      }
    }
    updateInfoPanel(best);
    canvas.style.cursor = best ? 'pointer' : 'crosshair';
  });
  canvas.addEventListener('mouseleave', () => { updateInfoPanel(null); canvas.style.cursor = 'crosshair'; });
}

function renderObjects() {
  const d = nodeData;
  const children = d.children || [];
  if (children.length === 0) { document.getElementById('content').innerHTML = '<div class="empty-state"><h2>Žádné objekty</h2></div>'; return; }

  let h = '<div style="background:var(--sf);border:1px solid var(--bd);border-radius:8px;overflow:auto">';
  h += '<table class="children-table"><thead><tr><th>Znak</th><th>ID</th><th>Název</th><th>Pozice</th><th>Rozměry</th><th>Tagy</th><th>Metadata</th></tr></thead><tbody>';
  for (const c of children) {
    const childPath = currentPath === '/' ? c.id : `${currentPath}/${c.id}`;
    const color = cc(c.char);
    const metaKeys = Object.keys(c.metadata || {});
    h += `<tr onclick="navigateTo('${childPath}')">`;
    h += `<td><span class="obj-char" style="background:${color}22;color:${color}">${esc(c.char)}</span></td>`;
    h += `<td><code>${esc(c.id)}</code></td>`;
    h += `<td>${esc(c.name)}${c.description ? `<br><span style="font-size:11px;color:var(--tx2)">${esc(c.description)}</span>` : ''}</td>`;
    h += `<td>(${c.x}, ${c.y})</td>`;
    h += `<td>${c.width}×${c.height}m</td>`;
    h += `<td>${(c.tags||[]).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</td>`;
    h += `<td>${metaKeys.map(k => `<span class="meta-pill">${esc(k)}:${esc(c.metadata[k])}</span>`).join('')}</td>`;
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  document.getElementById('content').innerHTML = h;
}

function colorizeAscii(lines) { return lines.map(l => colorizeAsciiLine(l)).join('\n'); }
function colorizeAsciiLine(line) {
  let h = '';
  for (const ch of line) {
    if (ch !== '.' && ch !== '#' && ch !== ' ') {
      h += `<span class="achar" data-char="${esc(ch)}" style="color:${cc(ch)}">${esc(ch)}</span>`;
    } else {
      h += `<span style="color:${cc(ch)}">${esc(ch)}</span>`;
    }
  }
  return h;
}
function renderLegend(legend) {
  if (!legend?.length) return '';
  let h = '<div class="legend-wrap">';
  for (const l of legend) {
    const color = cc(l.char);
    const childPath = currentPath === '/' ? l.id : `${currentPath}/${l.id}`;
    h += `<div class="legend-item" onclick="navigateTo('${childPath}')"><span class="legend-char" style="background:${color}22;color:${color}">${esc(l.char)}</span><span>${esc(l.id)} — ${esc(l.name)}</span></div>`;
  }
  return h + '</div>';
}
function infoCard(title, value, sub) {
  return `<div class="info-card"><h3>${title}</h3><div class="value">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
}

async function refresh() { await fetchTree(); await fetchNode(currentPath); }
setInterval(() => { if (document.getElementById('auto-refresh-check').checked) refresh(); }, 2000);
// Auto-reload UI on code change
let lastUiHash = null;
setInterval(async () => {
  try {
    const res = await fetch('/api/ui-hash');
    const { hash } = await res.json();
    if (lastUiHash && hash !== lastUiHash) location.reload();
    lastUiHash = hash;
  } catch {}
}, 1500);
refresh();
</script>
