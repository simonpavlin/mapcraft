<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapCraft — Prohlížeč map</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="sidebar">
  <div id="sidebar-header"><h1>MapCraft</h1><p>Map Explorer v0.8</p></div>
  <div id="tree-container"><div id="tree"></div></div>
  <div id="activity-panel">
    <div id="activity-header">MCP Activity</div>
    <div id="activity-log"></div>
  </div>
</div>
<div id="main">
  <div id="breadcrumb"></div>
  <div id="toolbar"></div>
  <div id="content"><div class="empty-state"><h2>Žádná mapa</h2><p>Použij MCP server k vytvoření mapy</p></div></div>
</div>
<button id="refresh-btn" type="button">Obnovit</button>
<div id="auto-refresh"><input type="checkbox" id="auto-refresh-check" checked><label for="auto-refresh-check">Auto (2s)</label></div>
<script type="module" src="/js/main.js"></script>
</body>
</html>
